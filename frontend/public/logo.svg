<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>체크메이트 logo</title>
  <desc>Clean blue app-style speech bubble logo with a white rounded check mark and Korean wordmark.</desc>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#2563EB" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="blueGradient" x1="350" y1="130" x2="850" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Symbol -->
  <g filter="url(#softShadow)">
    <!-- Rounded squircle speech bubble -->
    <path d="M376 130H824C899.111 130 960 190.889 960 266V444C960 519.111 899.111 580 824 580H639.5L615.2 623.2C608.5 635.1 591.5 635.1 584.8 623.2L560.5 580H376C300.889 580 240 519.111 240 444V266C240 190.889 300.889 130 376 130Z" fill="url(#blueGradient)"/>

    <!-- Rounded check mark -->
    <path d="M431 353L542 462L771 255" stroke="white" stroke-width="74" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g aria-label="체크메이트">
    <text x="600" y="770" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, Arial, sans-serif" font-size="140" font-weight="800" letter-spacing="-5">
      <tspan fill="#3B82F6">체크</tspan><tspan fill="#374151">메이트</tspan>
    </text>
  </g>
</svg>
